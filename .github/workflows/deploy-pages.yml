name: Deploy Waggle to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Project site serves under /<repo>/. Change to '/' if you attach a custom
      # domain (and set the CNAME in repo Settings → Pages).
      PAGES_BASE: /waggle/
      # Production API config. Override in repo Settings → Secrets and variables
      # → Actions (Variables) if these ever move.
      VITE_USE_MOCK: 'false'
      VITE_FYP_BASE: ${{ vars.VITE_FYP_BASE || 'https://testapi.hivescan.info/haf-fyp-api' }}
      VITE_FYP_ADMIN_BASE: ${{ vars.VITE_FYP_ADMIN_BASE || 'https://testapi.hivescan.info/haf-fyp-admin' }}
      VITE_HIVE_RPC: ${{ vars.VITE_HIVE_RPC || 'https://api.hive.blog' }}
      # Feed telemetry (#12) — OFF by default until the backend retention/rollup
      # follow-up lands. Set the VITE_TELEMETRY repo variable to 'true' to enable.
      VITE_TELEMETRY: ${{ vars.VITE_TELEMETRY || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
